<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048小游戏</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #faf8ef; min-height: 100vh; }
    .game-container { display: flex; flex-direction: column; align-items: center; position: relative; }
    .score { font-size: 24px; font-weight: bold; margin-bottom: 10px; color: #776e65; }
    canvas { border: 4px solid #bbada0; border-radius: 6px; background: #bbada0; transition: transform 0.3s ease; }
    canvas.shake { animation: shake 0.5s ease-in-out; }
    button { margin-top: 15px; padding: 10px 20px; font-size: 16px; cursor: pointer; background: #8f7a66; color: white; border: none; border-radius: 4px; }
    button:hover { background: #9f8a76; }
    .hint { margin-top: 10px; color: #8f7a65; }
    .game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(238, 228, 218, 0.95); padding: 40px; border-radius: 10px; text-align: center; display: none; z-index: 10; border: 4px solid #bbada0; }
    .game-over.show { display: block; animation: fadeIn 0.5s ease; }
    .game-over h2 { font-size: 36px; color: #776e65; margin-bottom: 10px; }
    .game-over p { font-size: 18px; color: #8f7a65; margin-bottom: 20px; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-10px); }
      40%, 80% { transform: translateX(10px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="score">分数: <span id="score">0</span></div>
    <canvas id="canvas"></canvas>
    <button id="restartBtn">重新开始</button>
    <p class="hint">使用方向键操作</p>
    <div class="game-over" id="gameOver">
      <h2>游戏结束!</h2>
      <p>最终分数: <span id="finalScore">0</span></p>
      <button onclick="initGame()">再来一局</button>
    </div>
  </div>

  <script>
    const GRID_SIZE = 4;
    const CELL_SIZE = 80;
    const CELL_GAP = 10;
    const COLORS = {
      2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563',
      32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61',
      512: '#edc850', 1024: '#edc53f', 2048: '#edc22e'
    };

    let grid = [];
    let score = 0;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function initGame() {
      grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(0));
      score = 0;
      document.getElementById('gameOver').classList.remove('show');
      addRandomTile();
      addRandomTile();
      draw();
      updateScore();
    }

    function addRandomTile() {
      const emptyCells = [];
      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          if (grid[r][c] === 0) emptyCells.push([r, c]);
        }
      }
      if (emptyCells.length) {
        const [r, c] = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        grid[r][c] = Math.random() < 0.9 ? 2 : 4;
      }
    }

    function updateScore() {
      document.getElementById('score').textContent = score;
    }

    function draw() {
      const size = GRID_SIZE * CELL_SIZE + (GRID_SIZE + 1) * CELL_GAP;
      canvas.width = size;
      canvas.height = size;

      ctx.fillStyle = '#bbada0';
      ctx.fillRect(0, 0, size, size);

      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          const x = CELL_GAP + c * (CELL_SIZE + CELL_GAP);
          const y = CELL_GAP + r * (CELL_SIZE + CELL_GAP);
          const val = grid[r][c];

          ctx.fillStyle = val ? COLORS[val] || '#3c3a32' : '#cdc1b4';
          ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);

          if (val) {
            ctx.fillStyle = val <= 4 ? '#776e65' : '#f9f6f2';
            ctx.font = val >= 1000 ? 'bold 32px Arial' : 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(val, x + CELL_SIZE / 2, y + CELL_SIZE / 2);
          }
        }
      }
    }

    function checkGameOver() {
      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          if (grid[r][c] === 0) return false;
          const current = grid[r][c];
          if (r < GRID_SIZE - 1 && grid[r + 1][c] === current) return false;
          if (c < GRID_SIZE - 1 && grid[r][c + 1] === current) return false;
        }
      }
      return true;
    }

    function showGameOver() {
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOver').classList.add('show');
      canvas.classList.add('shake');
      setTimeout(() => canvas.classList.remove('shake'), 500);
    }

    function move(direction) {
      let newGrid = grid.map(row => [...row]);
      let newScore = score;
      let moved = false;

      const processLine = (line) => {
        let filtered = line.filter(x => x !== 0);
        for (let i = 0; i < filtered.length - 1; i++) {
          if (filtered[i] === filtered[i + 1]) {
            filtered[i] *= 2;
            newScore += filtered[i];
            filtered.splice(i + 1, 1);
          }
        }
        while (filtered.length < GRID_SIZE) filtered.push(0);
        return filtered;
      };

      for (let i = 0; i < GRID_SIZE; i++) {
        let original;
        if (direction === 'left') {
          original = [...newGrid[i]];
          newGrid[i] = processLine([...newGrid[i]]);
          if (JSON.stringify(newGrid[i]) !== JSON.stringify(original)) moved = true;
        } else if (direction === 'right') {
          original = [...newGrid[i]];
          let processed = processLine([...newGrid[i]].reverse()).reverse();
          newGrid[i] = processed;
          if (JSON.stringify(newGrid[i]) !== JSON.stringify(original)) moved = true;
        } else if (direction === 'up') {
          original = newGrid.map(r => r[i]);
          let processed = processLine([...original]);
          newGrid.forEach((row, r) => row[i] = processed[r]);
          if (JSON.stringify(newGrid.map(r => r[i])) !== JSON.stringify(original)) moved = true;
        } else if (direction === 'down') {
          original = newGrid.map(r => r[i]);
          let processed = processLine([...original].reverse()).reverse();
          newGrid.forEach((row, r) => row[i] = processed[r]);
          if (JSON.stringify(newGrid.map(r => r[i])) !== JSON.stringify(original)) moved = true;
        }
      }

      if (moved) {
        grid = newGrid;
        score = newScore;
        addRandomTile();
        draw();
        updateScore();
        if (checkGameOver()) {
          setTimeout(showGameOver, 300);
        }
      }
    }

    document.getElementById('restartBtn').addEventListener('click', () => initGame());

    document.addEventListener('keydown', (e) => {
      const keyMap = { 'ArrowUp': 'up', 'ArrowDown': 'down', 'ArrowLeft': 'left', 'ArrowRight': 'right' };
      if (keyMap[e.key]) {
        e.preventDefault();
        e.stopPropagation();
        move(keyMap[e.key]);
      }
    });

    initGame();
  </script>
</body>
</html>
